# Multi-container setup:
# db        → PostgreSQL storage
# prefect   → orchestration UI + API
# pipeline  → runs ingestion + processing flows
# dashboard → Streamlit UI

version: "3.9"
services:
  db:
    image: postgres:15
    container_name: nasdaq-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - .:/app
      - ./logs:/app/logs
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: nasdaq-prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('127.0.0.1', 4200))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  pipeline:
  # Runs Prefect flows (ingestion → processing → ML)
    build: .
    image: nasdaq-app-base:latest
    container_name: nasdaq-pipeline
    command: python orchestration/flows.py
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect:4200/api   # tells pipeline where Prefect server is
      PYTHONPATH: .
    volumes:
      - .:/app
      - ./models:/app/models
      
    depends_on:
      db:
        condition: service_healthy
      prefect:
        condition: service_healthy   # wait for Prefect before running flows

  dashboard:
  # Streamlit UI for viewing prices, features, predictions
    build: .
    image: nasdaq-app-base:latest
    container_name: nasdaq-dashboard
    command: streamlit run serving/dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      PYTHONPATH: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./models:/app/models  
      
    depends_on:
      db:
        condition: service_healthy
      prefect:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  model_store: