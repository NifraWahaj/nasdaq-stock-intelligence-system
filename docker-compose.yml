version: "3.9"

services:
  db:
    image: postgres:15
    container_name: nasdaq-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: nasdaq-api
    command: uvicorn serving.api:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - model_store:/app/models
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: .
    container_name: nasdaq-dashboard
    command: streamlit run serving/dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    build: .
    container_name: nasdaq-pipeline
    command: python orchestration/flows.py
    env_file: .env
    volumes:
      - .:/app
      - model_store:/app/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  model_store: